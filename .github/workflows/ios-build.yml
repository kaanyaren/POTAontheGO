name: Build iOS IPA

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  ios:
    name: build-ios-ipa
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.1'

      - name: Enable xcode license (required on GitHub runners)
        run: sudo xcodebuild -license accept || true

      - name: Install dependencies
        run: |
          cd pota_on_the_go
          flutter pub get

      - name: Build iOS IPA (no codesign)
        run: |
          cd pota_on_the_go
          flutter build ipa --no-codesign

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-ipa
          path: pota_on_the_go/build/ios/ipa/*.ipa
